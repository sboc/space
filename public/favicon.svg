<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="sun" cx="40%" cy="35%">
      <stop offset="0%"   stop-color="#FFFAC0"/>
      <stop offset="55%"  stop-color="#FDB813"/>
      <stop offset="100%" stop-color="#E06010"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%">
      <stop offset="0%"   stop-color="#FFE566" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FDB813" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="earth" cx="35%" cy="30%">
      <stop offset="0%"   stop-color="#7ECFFF"/>
      <stop offset="100%" stop-color="#1E6BB0"/>
    </radialGradient>
    <radialGradient id="saturn-g" cx="35%" cy="30%">
      <stop offset="0%"   stop-color="#F0E5A0"/>
      <stop offset="100%" stop-color="#C8A840"/>
    </radialGradient>
  </defs>

  <!-- Space background -->
  <rect width="64" height="64" fill="#060D1E" rx="8"/>

  <!-- Stars -->
  <circle cx="5"  cy="7"  r="0.5" fill="white" opacity="0.75"/>
  <circle cx="57" cy="11" r="0.4" fill="white" opacity="0.60"/>
  <circle cx="14" cy="55" r="0.5" fill="white" opacity="0.80"/>
  <circle cx="56" cy="50" r="0.4" fill="white" opacity="0.70"/>
  <circle cx="49" cy="19" r="0.3" fill="white" opacity="0.55"/>
  <circle cx="6"  cy="40" r="0.4" fill="white" opacity="0.65"/>
  <circle cx="60" cy="33" r="0.3" fill="white" opacity="0.50"/>
  <circle cx="22" cy="4"  r="0.3" fill="white" opacity="0.60"/>
  <circle cx="42" cy="58" r="0.35" fill="white" opacity="0.55"/>
  <circle cx="3"  cy="27" r="0.3" fill="white" opacity="0.50"/>

  <!-- Sun glow -->
  <circle cx="32" cy="32" r="12" fill="url(#glow)"/>

  <!-- Orbit paths -->
  <ellipse cx="32" cy="32" rx="9"  ry="8"  fill="none" stroke="white" stroke-opacity="0.18" stroke-width="0.5"/>
  <ellipse cx="32" cy="32" rx="15" ry="13" fill="none" stroke="white" stroke-opacity="0.15" stroke-width="0.5"/>
  <ellipse cx="32" cy="32" rx="25" ry="21" fill="none" stroke="white" stroke-opacity="0.12" stroke-width="0.5"/>

  <!-- Sun -->
  <circle cx="32" cy="32" r="4.8" fill="url(#sun)"/>

  <!-- Mercury (top of orbit 1) -->
  <circle cx="32" cy="24" r="0.9" fill="#AAAAAA"/>

  <!-- Mars (left of orbit 2, ~195°) -->
  <circle cx="17.5" cy="28.6" r="1.0" fill="#C1440E"/>

  <!-- Earth (right of orbit 2, ~15°) -->
  <circle cx="46.5" cy="35.4" r="1.3" fill="url(#earth)"/>

  <!-- Saturn system (bottom-left of orbit 3, ~198°) -->
  <!-- Ring back half (behind planet) -->
  <ellipse cx="9" cy="40" rx="5.0" ry="1.5" fill="none" stroke="#C8A840" stroke-width="0.9" stroke-opacity="0.5"/>
  <!-- Saturn body -->
  <circle cx="9" cy="40" r="2.5" fill="url(#saturn-g)"/>
  <!-- Ring front half (in front of planet) — bottom arc only -->
  <path d="M 4 40 A 5 1.5 0 0 1 14 40" fill="none" stroke="#C8A840" stroke-width="0.9" stroke-opacity="0.95"/>
</svg>
